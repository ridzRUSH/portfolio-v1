name: Deploy Vite React App to GitHub Pages

on:
  push:
    branches: ["main"]

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # ✅ opt-in now

    steps:
      - name: Checkout
        uses: actions/checkout@v4   # still fine (GitHub will upgrade runtime)

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20   # or 22 (recommended going forward)
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build (Vite)
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload dist
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v5
